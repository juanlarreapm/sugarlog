<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Sugarlog — pediatric T1D companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; min-height: 100dvh; font-family: 'Nunito', system-ui, sans-serif; }
  body {
    padding-top: env(safe-area-inset-top);
    box-sizing: border-box;
  }
  #stage { width: 100%; min-height: 100dvh; }
  #root { width: 100%; min-height: 100dvh; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  .tabbar-wrap { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
</style>
</head>
<body>

<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="text/babel" src="js/supabase.jsx"></script>
<script type="text/babel" src="js/data.jsx"></script>
<script type="text/babel" src="js/theme.jsx"></script>
<script type="text/babel" src="js/icons.jsx"></script>
<script type="text/babel" src="js/shared.jsx"></script>
<script type="text/babel" src="js/body-map.jsx"></script>
<script type="text/babel" src="js/forms.jsx"></script>
<script type="text/babel" src="js/screens-entry.jsx"></script>
<script type="text/babel" src="js/screens-today.jsx"></script>
<script type="text/babel" src="js/screens-history.jsx"></script>
<script type="text/babel" src="js/screens-drift.jsx"></script>
<script type="text/babel" src="js/screens-export.jsx"></script>
<script type="text/babel" src="js/import-flow.jsx"></script>
<script type="text/babel" src="js/onboarding.jsx"></script>
<script type="text/babel" src="js/profile.jsx"></script>
<script type="text/babel" src="js/app.jsx"></script>

<script type="text/babel">
  function useViewport() {
    const [w, setW] = React.useState(window.innerWidth);
    React.useEffect(() => {
      const h = () => setW(window.innerWidth);
      window.addEventListener('resize', h);
      return () => window.removeEventListener('resize', h);
    }, []);
    return { width: w, isMobile: w < 640, isTablet: w >= 640 && w < 1024, isDesktop: w >= 1024 };
  }
  window.useViewport = useViewport;

  function Root() {
    return <App/>;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

</body>
</html>

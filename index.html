<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sugarlog — pediatric T1D companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; font-family: 'Nunito', system-ui, sans-serif; }
  body {
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 20% 10%, oklch(0.93 0.04 35 / 0.4), transparent 50%),
      radial-gradient(circle at 80% 90%, oklch(0.92 0.04 195 / 0.5), transparent 50%),
      oklch(0.96 0.012 75);
    padding: 20px;
    box-sizing: border-box;
  }
  #stage { display: flex; align-items: center; justify-content: center; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
</style>
</head>
<body>

<div id="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="text/babel" src="js/supabase.jsx"></script>
<script type="text/babel" src="js/ios-frame.jsx"></script>
<script type="text/babel" src="js/data.jsx"></script>
<script type="text/babel" src="js/theme.jsx"></script>
<script type="text/babel" src="js/icons.jsx"></script>
<script type="text/babel" src="js/shared.jsx"></script>
<script type="text/babel" src="js/body-map.jsx"></script>
<script type="text/babel" src="js/forms.jsx"></script>
<script type="text/babel" src="js/screens-entry.jsx"></script>
<script type="text/babel" src="js/screens-today.jsx"></script>
<script type="text/babel" src="js/screens-history.jsx"></script>
<script type="text/babel" src="js/screens-drift.jsx"></script>
<script type="text/babel" src="js/screens-export.jsx"></script>
<script type="text/babel" src="js/import-flow.jsx"></script>
<script type="text/babel" src="js/app.jsx"></script>

<script type="text/babel">
  function Root() {
    return (
      <IOSDevice width={390} height={844} dark={false}>
        <App/>
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

</body>
</html>
